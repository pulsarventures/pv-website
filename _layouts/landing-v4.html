<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">
    <link rel="alternate icon" href="{{ '/assets/img/pulsarventures.png' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/img/pulsarventures.png' | relative_url }}">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- Tailwind Config -->
    <script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                },
                colors: {
                    brand: {
                        50:  '#f5f3ff',
                        100: '#ede9fe',
                        200: '#ddd6fe',
                        300: '#c4b5fd',
                        400: '#a78bfa',
                        500: '#8b5cf6',
                        600: '#7c3aed',
                        700: '#6d28d9',
                        800: '#5b21b6',
                        900: '#4c1d95',
                        950: '#2e1065',
                    }
                },
                animation: {
                    'fade-up': 'fadeUp 0.6s ease-out forwards',
                    'fade-in': 'fadeIn 0.6s ease-out forwards',
                    'slide-right': 'slideRight 0.6s ease-out forwards',
                    'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                },
                keyframes: {
                    fadeUp: {
                        '0%': { opacity: '0', transform: 'translateY(30px)' },
                        '100%': { opacity: '1', transform: 'translateY(0)' },
                    },
                    fadeIn: {
                        '0%': { opacity: '0' },
                        '100%': { opacity: '1' },
                    },
                    slideRight: {
                        '0%': { opacity: '0', transform: 'translateX(-30px)' },
                        '100%': { opacity: '1', transform: 'translateX(0)' },
                    },
                }
            }
        }
    }
    </script>

    <!-- Custom Styles -->
    <style>
        /* ===== REVEAL ANIMATIONS ===== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease-out, transform 0.7s ease-out;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }
        /* ===== HOW WE WORK — FLOW GRAPH (static) ===== */
        .how-we-work-flow {
            position: sticky;
            top: 4.75rem;
            z-index: 20;
            padding: 1.25rem 0.5rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid transparent;
            border-radius: 0 0 1rem 1rem;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .how-we-work-flow.is-stuck {
            border-bottom-color: rgba(226, 232, 240, 0.9);
            box-shadow: 0 10px 24px -16px rgba(15, 23, 42, 0.25);
        }
        .flow-node-circle {
            fill: #ffffff;
            stroke: #c4b5fd;
            stroke-width: 2;
            transition: fill 0.4s ease, stroke 0.4s ease;
        }
        .flow-node-label {
            font-family: Inter, system-ui, sans-serif;
            font-size: 11px;
            font-weight: 700;
            fill: #7c3aed;
            transition: fill 0.4s ease;
        }
        .flow-node.is-active .flow-node-circle {
            fill: url(#flowGrad);
            stroke: #5b21b6;
        }
        .flow-node.is-active .flow-node-label { fill: #ffffff; }
        @media (prefers-reduced-motion: reduce) {
            .how-we-work-flow { position: static; background: transparent; backdrop-filter: none; }
        }

        /* ===== HOW WE WORK — PATH CARDS ===== */
        .how-we-work-path-card {
            position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(245,243,255,0.6) 100%);
            border: 1px solid rgba(196, 181, 253, 0.4);
            backdrop-filter: blur(8px);
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
        }
        .how-we-work-path-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(124, 58, 237, 0.12);
            border-color: rgba(124, 58, 237, 0.35);
        }
        .how-we-work-path-icon {
            width: 1.75rem; height: 1.75rem;
            border-radius: 0.5rem;
            background: linear-gradient(135deg, #ede9fe, #f5f3ff);
            display: flex; align-items: center; justify-content: center;
        }

        /* ===== HOW WE WORK — TIMELINE ===== */
        #how-we-work-timeline {
            position: relative;
        }
        .how-we-work-line {
            overflow: visible;
        }
        .how-we-work-line-fill {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, #7c3aed 0%, #a78bfa 40%, #c4b5fd 70%, #ddd6fe 100%);
            border-radius: 999px;
            transform: scaleY(0);
            transform-origin: top;
            will-change: transform;
        }
        /* Markers dim until the progress line reaches them, then light up */
        .how-we-work-marker {
            opacity: 0.45;
            transform: scale(0.85);
            transition: opacity 0.4s ease-out, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .how-we-work-marker.is-reached {
            opacity: 1;
            transform: scale(1);
        }
        @media (prefers-reduced-motion: reduce) {
            .how-we-work-line-fill { transform: scaleY(1); }
            .how-we-work-marker { opacity: 1; transform: none; transition: none; }
        }

        .how-we-work-marker {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            box-shadow: 0 4px 14px rgba(109, 40, 217, 0.45);
        }
        .how-we-work-icon {
            width: 1.75rem; height: 1.75rem;
            border-radius: 0.5rem;
            background: linear-gradient(135deg, #ede9fe, #ddd6fe);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
        }
        .how-we-work-card-inner {
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, #ffffff 0%, #fafafa 100%);
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 16px rgba(124, 58, 237, 0.06);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.35s, border-color 0.35s;
        }
        .how-we-work-card-inner:hover {
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.14);
        }
        .how-we-work-card-shine {
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s;
            pointer-events: none;
        }
        .how-we-work-card-inner:hover .how-we-work-card-shine { left: 150%; }
        .how-we-work-tag {
            display: inline-flex; align-items: center;
            border-radius: 0.375rem;
            border: 1px solid #ddd6fe;
            background: linear-gradient(180deg, #faf5ff, #f5f3ff);
            padding: 0.125rem 0.5rem;
            font-size: 0.6875rem;
            font-weight: 600;
            color: #6d28d9;
            line-height: 1.25rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .how-we-work-card-inner:hover .how-we-work-tag { box-shadow: 0 1px 4px rgba(109, 40, 217, 0.1); }
        .how-we-work-tag-muted {
            border-color: #e2e8f0;
            background: #f8fafc;
            color: #64748b;
        }
        @media (max-width: 767px) {
            .how-we-work-flow-svg { max-height: 100px; }
            .flow-node-label { font-size: 9px; }
        }

        /* ===== PRODUCT SERVICE TAGS ===== */
        .product-service-tag {
            display: inline-flex;
            align-items: center;
            border-radius: 0.375rem;
            padding: 0.125rem 0.5rem;
            font-size: 0.625rem;
            font-weight: 600;
            letter-spacing: 0.025em;
            line-height: 1rem;
        }
        .product-service-tag-b2b, .product-service-tag-b2c { background: #f1f5f9; color: #475569; }
        .product-service-tag-web, .product-service-tag-mobile, .product-service-tag-ios, .product-service-tag-desktop { background: #eff6ff; color: #1d4ed8; }
        .product-service-tag-aws { background: #fff7ed; color: #c2410c; }
        .product-service-tag-azure { background: #eff6ff; color: #1e40af; }
        .product-service-tag-gcp { background: #fef2f2; color: #b91c1c; }
        .product-service-tag-ai { background: #f5f3ff; color: #6d28d9; }

        /* ===== INTAKE FORM ===== */
        .intake-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.375rem;
        }
        .intake-input {
            display: block;
            width: 100%;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background: #fff;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            color: #0f172a;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .intake-input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
        }
        .intake-radio-card, .intake-check-tag {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }
        .intake-radio-card input, .intake-check-tag input { position: absolute; opacity: 0; pointer-events: none; }
        .intake-radio-card span, .intake-check-tag span {
            display: inline-flex;
            align-items: center;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background: #fff;
            padding: 0.375rem 0.75rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #475569;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }
        .intake-radio-card input:checked + span, .intake-check-tag input:checked + span {
            border-color: #7c3aed;
            background: #f5f3ff;
            color: #6d28d9;
        }
        #intake-status.intake-status-success {
            display: block;
            border: 1px solid #bbf7d0;
            background: #f0fdf4;
            color: #166534;
        }
        #intake-status.intake-status-error {
            display: block;
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: #991b1b;
        }

        /* ===== HERO BACKGROUND PATTERN ===== */
        .hero-grid {
            background-image:
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ===== GRADIENT TEXT (purple) ===== */
        .gradient-text {
            background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 50%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== GRADIENT TEXT V3 (purple to cyan) ===== */
        .gradient-text-v3 {
            background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== SUBTLE GLOW ===== */
        .glow-brand {
            box-shadow: 0 0 60px rgba(124, 58, 237, 0.15);
        }

        /* ===== CARD HOVER LIFT ===== */
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        /* ===== NAV BLUR ===== */
        .nav-blur {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* ===== PROGRESS LINE ===== */
        .progress-line {
            position: relative;
        }
        .progress-line::before {
            content: '';
            position: absolute;
            top: 24px;
            left: 24px;
            right: 24px;
            height: 2px;
            background: linear-gradient(90deg, #7c3aed, #a78bfa, #c4b5fd, #ddd6fe);
            z-index: 0;
        }
        @media (max-width: 768px) {
            .progress-line::before {
                display: none;
            }
        }

        /* ===== DARK SECTION WITH NOISE OVERLAY ===== */
        .dark-section {
            position: relative;
        }
        .dark-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }
        .dark-section > * {
            position: relative;
            z-index: 2;
        }

        /* ===== GLASSMORPHISM CARDS ===== */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ===== GRADIENT BORDER CARDS ===== */
        .gradient-border {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1rem;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1rem;
            padding: 1px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.5), rgba(6, 182, 212, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* ===== SVG WAVE DIVIDERS ===== */
        .wave-divider {
            position: absolute;
            left: 0;
            right: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
        }
        .wave-divider svg {
            display: block;
            width: 100%;
            height: 60px;
        }
        .wave-divider-top {
            top: -1px;
        }
        .wave-divider-bottom {
            bottom: -1px;
        }

        /* ===== PARTNER LOGO GRAYSCALE HOVER ===== */
        .partner-logo {
            filter: grayscale(100%);
            opacity: 0.6;
            transition: filter 0.3s ease, opacity 0.3s ease;
        }
        .partner-logo:hover {
            filter: grayscale(0%);
            opacity: 1;
        }

        /* ===== STAT CARD ===== */
        .stat-card {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.05) 0%, rgba(139, 92, 246, 0.02) 100%);
        }
    </style>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    {% if page.image %}
    <meta property="og:image" content="{{ page.image | absolute_url }}">
    {% elsif site.og_image %}
    <meta property="og:image" content="{{ site.og_image | absolute_url }}">
    {% endif %}
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    {% seo %}
</head>
<body class="font-sans antialiased text-slate-900 bg-white">

    {{ content }}

    <!-- ===== SCRIPTS ===== -->

    <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // ===== SCROLL REVEAL =====
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    // ===== HOW-WE-WORK TIMELINE — SCROLL-DRIVEN PROGRESS =====
    const hwwTimeline = document.getElementById('how-we-work-timeline');
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (hwwTimeline && !prefersReducedMotion) {
        const fills = hwwTimeline.querySelectorAll('.how-we-work-line-fill');
        const markers = hwwTimeline.querySelectorAll('.how-we-work-marker');
        const flowNodes = document.querySelectorAll('.how-we-work-flow .flow-node');
        let ticking = false;

        const updateTimeline = () => {
            ticking = false;
            const rect = hwwTimeline.getBoundingClientRect();
            const total = rect.height || 1;
            // The "playhead" sits 55% down the viewport; progress = how far it has
            // travelled through the timeline, clamped to [0,1].
            const triggerY = window.innerHeight * 0.55;
            let progress = (triggerY - rect.top) / total;
            progress = Math.max(0, Math.min(1, progress));

            fills.forEach(f => { f.style.transform = 'scaleY(' + progress + ')'; });
            markers.forEach(m => {
                const mRect = m.getBoundingClientRect();
                const mPos = (mRect.top + mRect.height / 2 - rect.top) / total;
                m.classList.toggle('is-reached', progress >= mPos - 0.02);
            });
            // Advance the sticky flow header: light up each node as it is reached.
            if (flowNodes.length) {
                const activeIndex = Math.min(
                    flowNodes.length - 1,
                    Math.floor(progress * flowNodes.length)
                );
                flowNodes.forEach((node, i) => node.classList.toggle('is-active', i <= activeIndex));
            }
        };

        // Add a subtle shadow to the flow header once it becomes stuck.
        const sentinel = document.getElementById('hww-sentinel');
        const flowHeader = document.querySelector('.how-we-work-flow');
        if (sentinel && flowHeader) {
            new IntersectionObserver(([e]) => {
                flowHeader.classList.toggle('is-stuck', !e.isIntersecting);
            }, { rootMargin: '-77px 0px 0px 0px', threshold: 0 }).observe(sentinel);
        }

        const requestTimelineTick = () => {
            if (!ticking) { ticking = true; requestAnimationFrame(updateTimeline); }
        };

        window.addEventListener('scroll', requestTimelineTick, { passive: true });
        window.addEventListener('resize', requestTimelineTick);
        updateTimeline();
    }

    // ===== NAVBAR SCROLL EFFECT =====
    // If nav has data-nav-fixed="white", keep it white always.
    // Otherwise toggle dark/transparent at top vs light on scroll.
    const nav = document.getElementById('landing-nav');
    const navLinks = document.querySelectorAll('.nav-link');
    if (nav && nav.dataset.navFixed !== 'white') {
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                nav.classList.add('bg-white/95', 'shadow-sm', 'nav-blur');
                nav.classList.remove('bg-transparent');
                navLinks.forEach(l => {
                    l.classList.remove('text-white/80', 'hover:text-white');
                    l.classList.add('text-slate-600', 'hover:text-brand-700');
                });
            } else {
                nav.classList.remove('bg-white/95', 'shadow-sm', 'nav-blur');
                nav.classList.add('bg-transparent');
                navLinks.forEach(l => {
                    l.classList.remove('text-slate-600', 'hover:text-brand-700');
                    l.classList.add('text-white/80', 'hover:text-white');
                });
            }
        });
    }


    // ===== INTAKE FORM (Web3Forms) =====
    const intakeForm = document.getElementById('intake-form');
    if (intakeForm) {
        const intakeSubmit = document.getElementById('intake-submit');
        const intakeStatus = document.getElementById('intake-status');

        const showIntakeStatus = (type, message) => {
            if (!intakeStatus) return;
            intakeStatus.className = type === 'success' ? 'intake-status-success' : 'intake-status-error';
            intakeStatus.textContent = message;
            intakeStatus.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };

        intakeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!intakeForm.checkValidity()) {
                intakeForm.reportValidity();
                return;
            }

            const accessKey = intakeForm.dataset.accessKey;
            if (!accessKey) {
                showIntakeStatus('error', 'Form is not configured. Please email us directly.');
                return;
            }

            const fd = new FormData(intakeForm);
            const platforms = fd.getAll('platform').join(', ') || 'Not specified';
            const clouds = fd.getAll('cloud').join(', ') || 'Not specified';
            const company = fd.get('company') || '';
            const name = fd.get('name') || '';
            const message = [
                'PROJECT INTAKE',
                '============',
                '',
                'ABOUT',
                'Name: ' + name,
                'Email: ' + (fd.get('email') || ''),
                'Company: ' + (company || 'N/A'),
                '',
                'IDEA',
                'Stage: ' + (fd.get('stage') || ''),
                'Description: ' + (fd.get('description') || ''),
                '',
                'TECHNICAL SCOPE',
                'Platforms: ' + platforms,
                'AI Product: ' + (fd.get('ai') || ''),
                'Team Size: ' + (fd.get('team') || ''),
                'Cloud: ' + clouds,
                '',
                'CONSTRAINTS',
                'Budget: ' + (fd.get('budget') || ''),
                'Timeline: ' + (fd.get('timeline') || ''),
                'Success Metrics: ' + (fd.get('metrics') || 'N/A'),
            ].join('\n');

            if (intakeSubmit) {
                intakeSubmit.disabled = true;
                intakeSubmit.textContent = 'Submitting…';
            }

            const payload = new FormData();
            payload.append('access_key', accessKey);
            payload.append('subject', 'Project Intake — ' + (company || name || 'New Inquiry'));
            payload.append('name', name);
            payload.append('email', fd.get('email') || '');
            payload.append('message', message);
            payload.append('botcheck', fd.get('botcheck') ? 'true' : '');

            try {
                // w3forms expects multipart FormData (not JSON); let the browser set the boundary.
                const response = await fetch('https://api.w3forms.com/submit', {
                    method: 'POST',
                    headers: { Accept: 'application/json' },
                    body: payload,
                });
                const result = await response.json();
                if (result.success) {
                    intakeForm.reset();
                    showIntakeStatus('success', 'Thanks — your intake was submitted. We will follow up within 2 business days.');
                } else {
                    showIntakeStatus('error', result.message || 'Something went wrong. Please try again or email us directly.');
                }
            } catch (err) {
                showIntakeStatus('error', 'Could not submit right now. Please try again or email us directly.');
            } finally {
                if (intakeSubmit) {
                    intakeSubmit.disabled = false;
                    intakeSubmit.textContent = 'Submit Intake';
                }
            }
        });
    }

    // ===== MOBILE MENU TOGGLE =====
    const menuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    if (menuBtn && mobileMenu) {
        menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => mobileMenu.classList.add('hidden'));
        });
    }

    // ===== SMOOTH SCROLL FOR ANCHOR LINKS =====
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });
    </script>
</body>
</html>
