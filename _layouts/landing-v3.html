<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- D3.js v7 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Tailwind Config -->
    <script>
    tailwindcss.config = {
        theme: {
            extend: {
                fontFamily: {
                    'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                },
                colors: {
                    brand: {
                        50:  '#f5f3ff',
                        100: '#ede9fe',
                        200: '#ddd6fe',
                        300: '#c4b5fd',
                        400: '#a78bfa',
                        500: '#8b5cf6',
                        600: '#7c3aed',
                        700: '#6d28d9',
                        800: '#5b21b6',
                        900: '#4c1d95',
                        950: '#2e1065',
                    }
                },
                animation: {
                    'fade-up': 'fadeUp 0.6s ease-out forwards',
                    'fade-in': 'fadeIn 0.6s ease-out forwards',
                    'slide-right': 'slideRight 0.6s ease-out forwards',
                    'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                },
                keyframes: {
                    fadeUp: {
                        '0%': { opacity: '0', transform: 'translateY(30px)' },
                        '100%': { opacity: '1', transform: 'translateY(0)' },
                    },
                    fadeIn: {
                        '0%': { opacity: '0' },
                        '100%': { opacity: '1' },
                    },
                    slideRight: {
                        '0%': { opacity: '0', transform: 'translateX(-30px)' },
                        '100%': { opacity: '1', transform: 'translateX(0)' },
                    },
                }
            }
        }
    }
    </script>

    <!-- Custom Styles -->
    <style>
        /* ===== REVEAL ANIMATIONS ===== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease-out, transform 0.7s ease-out;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }

        /* ===== GRADIENT TEXT ===== */
        .gradient-text-v3 {
            background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== DARK SECTION NOISE OVERLAY ===== */
        .dark-section {
            position: relative;
        }
        .dark-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }
        .dark-section > * {
            position: relative;
            z-index: 2;
        }

        /* ===== GLASSMORPHISM CARDS ===== */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ===== GRADIENT BORDER CARDS ===== */
        .gradient-border {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1rem;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1rem;
            padding: 1px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.5), rgba(6, 182, 212, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* ===== CARD HOVER ===== */
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        /* ===== NAV BLUR ===== */
        .nav-blur {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* ===== SVG WAVE DIVIDERS ===== */
        .wave-divider {
            position: absolute;
            left: 0;
            right: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
        }
        .wave-divider svg {
            display: block;
            width: 100%;
            height: 60px;
        }
        .wave-divider-top {
            top: -1px;
        }
        .wave-divider-bottom {
            bottom: -1px;
        }

        /* ===== D3 VISUALIZATION CONTAINERS ===== */
        #hero-network, #maturity-viz, #ecosystem-viz, #flywheel-viz, #cta-network {
            width: 100%;
            overflow: hidden;
        }
        #hero-network svg, #maturity-viz svg, #ecosystem-viz svg, #flywheel-viz svg, #cta-network svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ===== D3 NODE GLOW ===== */
        .node-glow {
            filter: url(#glow);
        }

        /* ===== PARTNERSHIP LOGOS ===== */
        .partner-logo {
            filter: grayscale(100%);
            opacity: 0.6;
            transition: filter 0.3s ease, opacity 0.3s ease;
        }
        .partner-logo:hover {
            filter: grayscale(0%);
            opacity: 1;
        }

        /* ===== COUNTER ANIMATION ===== */
        .counter {
            display: inline-block;
        }

        /* ===== D3 MATURITY TOOLTIP ===== */
        .maturity-tooltip {
            position: absolute;
            padding: 8px 16px;
            background: rgba(10, 1, 24, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 10;
            max-width: 250px;
        }

        /* ===== ECOSYSTEM NODE LABELS ===== */
        .ecosystem-label {
            pointer-events: none;
            user-select: none;
        }
    </style>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    {% seo %}
</head>
<body class="font-sans antialiased text-slate-900 bg-white overflow-x-hidden">

    <!-- SVG Definitions (glow filters) -->
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
    </svg>

    {{ content }}

    <!-- ===== SCRIPTS ===== -->
    <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // ===== SCROLL REVEAL =====
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    // ===== NAVBAR SCROLL =====
    const nav = document.getElementById('landing-nav');
    const navLinks = document.querySelectorAll('.nav-link');
    if (nav) {
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                nav.classList.add('bg-white/95', 'shadow-sm', 'nav-blur');
                nav.classList.remove('bg-transparent');
                navLinks.forEach(l => {
                    l.classList.remove('text-white/80', 'hover:text-white');
                    l.classList.add('text-slate-600', 'hover:text-brand-700');
                });
            } else {
                nav.classList.remove('bg-white/95', 'shadow-sm', 'nav-blur');
                nav.classList.add('bg-transparent');
                navLinks.forEach(l => {
                    l.classList.remove('text-slate-600', 'hover:text-brand-700');
                    l.classList.add('text-white/80', 'hover:text-white');
                });
            }
        });
    }

    // ===== MOBILE MENU =====
    const menuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    if (menuBtn && mobileMenu) {
        menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => mobileMenu.classList.add('hidden'));
        });
    }

    // ===== SMOOTH SCROLL =====
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });

    // ===== COUNTER ANIMATION =====
    function animateCounter(el, target, suffix = '', duration = 2000) {
        const start = 0;
        const startTime = performance.now();
        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
        function update(now) {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const value = Math.round(start + (target - start) * easeOutCubic(progress));
            el.textContent = value + suffix;
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }

    const counterObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && !entry.target.dataset.counted) {
                entry.target.dataset.counted = 'true';
                const target = parseInt(entry.target.dataset.target);
                const suffix = entry.target.dataset.suffix || '';
                animateCounter(entry.target, target, suffix);
            }
        });
    }, { threshold: 0.5 });
    document.querySelectorAll('.counter').forEach(el => counterObserver.observe(el));

    // ===== D3 HELPERS =====
    const isMobile = () => window.innerWidth < 768;

    // ===== D3 VIZ 1: HERO NEURAL NETWORK =====
    function initHeroNetwork() {
        const container = document.getElementById('hero-network');
        if (!container) return;
        container.innerHTML = '';
        const w = container.clientWidth;
        const h = container.clientHeight || 600;
        const nodeCount = isMobile() ? 30 : 70;
        const showLinks = !isMobile();

        const nodes = d3.range(nodeCount).map(i => ({
            id: i,
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 2 + 1.5,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
        }));

        const links = [];
        if (showLinks) {
            nodes.forEach((a, i) => {
                nodes.forEach((b, j) => {
                    if (j > i) {
                        const dist = Math.hypot(a.x - b.x, a.y - b.y);
                        if (dist < 150 && links.length < 120) {
                            links.push({ source: i, target: j });
                        }
                    }
                });
            });
        }

        const svg = d3.select(container).append('svg')
            .attr('viewBox', `0 0 ${w} ${h}`)
            .attr('preserveAspectRatio', 'xMidYMid slice');

        const linkGroup = svg.append('g');
        const nodeGroup = svg.append('g');

        const linkEls = linkGroup.selectAll('line').data(links).enter().append('line')
            .attr('stroke', 'rgba(139, 92, 246, 0.12)')
            .attr('stroke-width', 0.5);

        const nodeEls = nodeGroup.selectAll('circle').data(nodes).enter().append('circle')
            .attr('r', d => d.r)
            .attr('fill', (d, i) => {
                const colors = ['#8b5cf6', '#a78bfa', '#06b6d4', '#c4b5fd', '#14b8a6'];
                return colors[i % colors.length];
            })
            .attr('opacity', d => 0.3 + Math.random() * 0.5);

        function animate() {
            nodes.forEach(n => {
                n.x += n.vx;
                n.y += n.vy;
                if (n.x < 0 || n.x > w) n.vx *= -1;
                if (n.y < 0 || n.y > h) n.vy *= -1;
                n.x = Math.max(0, Math.min(w, n.x));
                n.y = Math.max(0, Math.min(h, n.y));
            });

            nodeEls.attr('cx', d => d.x).attr('cy', d => d.y);

            if (showLinks) {
                // Dynamically update links based on proximity
                const dynamicLinks = [];
                nodes.forEach((a, i) => {
                    nodes.forEach((b, j) => {
                        if (j > i) {
                            const dist = Math.hypot(a.x - b.x, a.y - b.y);
                            if (dist < 150) {
                                dynamicLinks.push({ source: a, target: b, dist });
                            }
                        }
                    });
                });

                const lineUpdate = linkGroup.selectAll('line').data(dynamicLinks);
                lineUpdate.exit().remove();
                const lineEnter = lineUpdate.enter().append('line');
                lineUpdate.merge(lineEnter)
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y)
                    .attr('stroke', d => `rgba(139, 92, 246, ${0.15 * (1 - d.dist / 150)})`)
                    .attr('stroke-width', 0.5);
            }

            requestAnimationFrame(animate);
        }
        animate();
    }

    // ===== D3 VIZ 2: AI MATURITY RADIAL ARC =====
    function initMaturityViz() {
        const container = document.getElementById('maturity-viz');
        if (!container) return;
        container.innerHTML = '';

        const size = Math.min(container.clientWidth, 500);
        const cx = size / 2;
        const cy = size / 2;
        const outerR = size * 0.42;
        const innerR = size * 0.26;
        const gap = 0.04;

        const phases = [
            { label: 'Assist', desc: 'Systems surface context, insights, and recommendations to support decision-making.', color: '#6d28d9' },
            { label: 'Automate', desc: 'Repeatable tasks and workflows are handled consistently by systems.', color: '#8b5cf6' },
            { label: 'Augment', desc: 'Expert judgment is enhanced through AI-supported reasoning and collaboration.', color: '#06b6d4' },
            { label: 'Autonomy', desc: 'Systems operate independently within clearly defined guardrails and boundaries.', color: '#14b8a6' },
        ];

        const arcAngle = (Math.PI * 2 - gap * phases.length) / phases.length;

        const svg = d3.select(container).append('svg')
            .attr('viewBox', `0 0 ${size} ${size}`)
            .attr('preserveAspectRatio', 'xMidYMid meet');

        const tooltip = d3.select(container).append('div').attr('class', 'maturity-tooltip');

        // Center text
        const centerLabel = svg.append('text')
            .attr('x', cx).attr('y', cy - 10)
            .attr('text-anchor', 'middle')
            .attr('fill', 'white')
            .attr('font-size', isMobile() ? '14px' : '18px')
            .attr('font-weight', '700')
            .text('AI Maturity');

        const centerDesc = svg.append('text')
            .attr('x', cx).attr('y', cy + 14)
            .attr('text-anchor', 'middle')
            .attr('fill', 'rgba(255,255,255,0.6)')
            .attr('font-size', isMobile() ? '10px' : '12px')
            .text('Hover to explore');

        const arcGen = d3.arc().innerRadius(innerR).cornerRadius(4);

        phases.forEach((phase, i) => {
            const startAngle = i * (arcAngle + gap) - Math.PI / 2;
            const endAngle = startAngle + arcAngle;

            const arcPath = svg.append('path')
                .datum({ startAngle, endAngle, outerRadius: outerR })
                .attr('d', arcGen)
                .attr('transform', `translate(${cx},${cy})`)
                .attr('fill', phase.color)
                .attr('opacity', 0.8)
                .attr('cursor', 'pointer')
                .style('transition', 'opacity 0.2s');

            // Entry animation: draw arcs from 0
            arcPath
                .attr('d', arcGen({ startAngle, endAngle: startAngle, outerRadius: outerR }))
                .transition()
                .delay(i * 200)
                .duration(800)
                .ease(d3.easeCubicOut)
                .attrTween('d', function() {
                    const interp = d3.interpolate(startAngle, endAngle);
                    return function(t) {
                        return arcGen({ startAngle, endAngle: interp(t), outerRadius: outerR });
                    };
                });

            // Arc label
            const midAngle = (startAngle + endAngle) / 2;
            const labelR = (innerR + outerR) / 2;
            svg.append('text')
                .attr('x', cx + Math.cos(midAngle) * labelR)
                .attr('y', cy + Math.sin(midAngle) * labelR)
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'middle')
                .attr('fill', 'white')
                .attr('font-size', isMobile() ? '10px' : '13px')
                .attr('font-weight', '600')
                .attr('pointer-events', 'none')
                .attr('opacity', 0)
                .transition().delay(i * 200 + 600).duration(400)
                .attr('opacity', 1)
                .text(phase.label);

            // Hover interactions
            arcPath.on('mouseenter', function(event) {
                d3.select(this).attr('opacity', 1);
                d3.select(this).transition().duration(200)
                    .attr('d', arcGen({ startAngle, endAngle, outerRadius: outerR + 8 }));
                centerLabel.text(phase.label);
                centerDesc.text('Phase ' + (i + 1));
                tooltip.style('opacity', 1)
                    .html(`<strong>${phase.label}</strong><br>${phase.desc}`)
                    .style('left', (event.offsetX + 10) + 'px')
                    .style('top', (event.offsetY - 10) + 'px');
            }).on('mousemove', function(event) {
                tooltip.style('left', (event.offsetX + 10) + 'px')
                    .style('top', (event.offsetY - 10) + 'px');
            }).on('mouseleave', function() {
                d3.select(this).attr('opacity', 0.8);
                d3.select(this).transition().duration(200)
                    .attr('d', arcGen({ startAngle, endAngle, outerRadius: outerR }));
                centerLabel.text('AI Maturity');
                centerDesc.text('Hover to explore');
                tooltip.style('opacity', 0);
            });

            // Touch support for mobile
            arcPath.on('touchstart', function(event) {
                event.preventDefault();
                centerLabel.text(phase.label);
                centerDesc.text(phase.desc.substring(0, 40) + '...');
                d3.select(this).attr('opacity', 1)
                    .transition().duration(200)
                    .attr('d', arcGen({ startAngle, endAngle, outerRadius: outerR + 8 }));
            });
        });
    }

    // ===== D3 VIZ 3: PRODUCT ECOSYSTEM FORCE GRAPH =====
    function initEcosystemViz() {
        const container = document.getElementById('ecosystem-viz');
        if (!container) return;
        container.innerHTML = '';

        const w = container.clientWidth;
        const h = Math.min(w * 0.75, 500);
        const mobile = isMobile();

        const nodes = [
            { id: 'core', label: 'Expert System\nFramework', group: 'core', r: mobile ? 35 : 50, color: '#6d28d9', url: null },
            { id: 'linklibrary', label: 'LinkLibrary', group: 'product', r: mobile ? 22 : 30, color: '#3b82f6', url: 'https://linklibrary.ai' },
            { id: 'finciples', label: 'Finciples', group: 'product', r: mobile ? 22 : 30, color: '#10b981', url: 'https://finciples.ai' },
            { id: 'chatpilot', label: 'ChatPilot', group: 'product', r: mobile ? 22 : 30, color: '#8b5cf6', url: 'https://chatpilot.dev' },
            { id: 'exitbetter', label: 'ExitBetter', group: 'product', r: mobile ? 22 : 30, color: '#f59e0b', url: 'https://exitous.co' },
            { id: 'raiq', label: 'RAIQ', group: 'product', r: mobile ? 22 : 30, color: '#f43f5e', url: 'https://tacilent.ai' },
            { id: 'voiceio', label: 'Voice IO', group: 'lab', r: mobile ? 18 : 24, color: '#06b6d4', url: null },
            { id: 'sayhello', label: 'SayHello', group: 'lab', r: mobile ? 18 : 24, color: '#14b8a6', url: null },
        ];

        const links = [
            { source: 'core', target: 'linklibrary' },
            { source: 'core', target: 'finciples' },
            { source: 'core', target: 'chatpilot' },
            { source: 'core', target: 'exitbetter' },
            { source: 'core', target: 'raiq' },
            { source: 'core', target: 'voiceio' },
            { source: 'core', target: 'sayhello' },
        ];

        const svg = d3.select(container).append('svg')
            .attr('viewBox', `0 0 ${w} ${h}`)
            .attr('preserveAspectRatio', 'xMidYMid meet');

        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(links).id(d => d.id).distance(mobile ? 100 : 160))
            .force('charge', d3.forceManyBody().strength(-300))
            .force('center', d3.forceCenter(w / 2, h / 2))
            .force('collision', d3.forceCollide().radius(d => d.r + 10));

        // Animated dashed links
        const linkEls = svg.append('g').selectAll('line').data(links).enter().append('line')
            .attr('stroke', d => {
                const target = nodes.find(n => n.id === (typeof d.target === 'object' ? d.target.id : d.target));
                return target ? target.color : '#8b5cf6';
            })
            .attr('stroke-opacity', 0.4)
            .attr('stroke-width', 2)
            .attr('stroke-dasharray', '6,4');

        // Animate dashes
        function animateDashes() {
            linkEls.attr('stroke-dashoffset', function() {
                const current = parseFloat(d3.select(this).attr('stroke-dashoffset') || 0);
                return current - 0.5;
            });
            requestAnimationFrame(animateDashes);
        }
        animateDashes();

        // Nodes
        const nodeGroup = svg.append('g').selectAll('g').data(nodes).enter().append('g')
            .attr('cursor', d => d.url ? 'pointer' : 'grab')
            .call(d3.drag()
                .on('start', (event, d) => {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x; d.fy = d.y;
                })
                .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                .on('end', (event, d) => {
                    if (!event.active) simulation.alphaTarget(0);
                    d.fx = null; d.fy = null;
                })
            );

        nodeGroup.append('circle')
            .attr('r', d => d.r)
            .attr('fill', d => d.color)
            .attr('opacity', 0.9)
            .attr('filter', d => d.group === 'core' ? 'url(#glow-strong)' : 'url(#glow)');

        // Labels
        nodeGroup.each(function(d) {
            const g = d3.select(this);
            const lines = d.label.split('\n');
            lines.forEach((line, i) => {
                g.append('text')
                    .attr('text-anchor', 'middle')
                    .attr('dy', (i - (lines.length - 1) / 2) * 14)
                    .attr('fill', 'white')
                    .attr('font-size', d.group === 'core' ? (mobile ? '9px' : '12px') : (mobile ? '8px' : '11px'))
                    .attr('font-weight', d.group === 'core' ? '700' : '600')
                    .attr('pointer-events', 'none')
                    .text(line);
            });
            if (d.group === 'lab') {
                g.append('text')
                    .attr('text-anchor', 'middle')
                    .attr('dy', 20)
                    .attr('fill', 'rgba(255,255,255,0.5)')
                    .attr('font-size', '8px')
                    .attr('pointer-events', 'none')
                    .text('Labs');
            }
        });

        // Hover: highlight connections
        nodeGroup.on('mouseenter', function(event, d) {
            const connected = new Set();
            connected.add(d.id);
            links.forEach(l => {
                const sid = typeof l.source === 'object' ? l.source.id : l.source;
                const tid = typeof l.target === 'object' ? l.target.id : l.target;
                if (sid === d.id) connected.add(tid);
                if (tid === d.id) connected.add(sid);
            });
            nodeGroup.select('circle').attr('opacity', n => connected.has(n.id) ? 1 : 0.2);
            linkEls.attr('stroke-opacity', l => {
                const sid = typeof l.source === 'object' ? l.source.id : l.source;
                const tid = typeof l.target === 'object' ? l.target.id : l.target;
                return (sid === d.id || tid === d.id) ? 0.8 : 0.1;
            });
        }).on('mouseleave', function() {
            nodeGroup.select('circle').attr('opacity', 0.9);
            linkEls.attr('stroke-opacity', 0.4);
        });

        // Click to open URL
        nodeGroup.on('click', function(event, d) {
            if (d.url) window.open(d.url, '_blank');
        });

        simulation.on('tick', () => {
            linkEls
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
        });
    }

    // ===== D3 VIZ 4: EXECUTION FLYWHEEL =====
    function initFlywheelViz() {
        const container = document.getElementById('flywheel-viz');
        if (!container) return;
        container.innerHTML = '';

        const w = container.clientWidth;
        const h = Math.min(w, 450);
        const cx = w / 2;
        const cy = h / 2;
        const radius = Math.min(w, h) * 0.32;
        const mobile = isMobile();

        const steps = [
            { label: 'Events', color: '#8b5cf6', icon: '🎤' },
            { label: 'Workshops', color: '#06b6d4', icon: '🛠' },
            { label: 'Projects', color: '#14b8a6', icon: '🚀' },
            { label: 'Products', color: '#f59e0b', icon: '📦' },
        ];

        const svg = d3.select(container).append('svg')
            .attr('viewBox', `0 0 ${w} ${h}`)
            .attr('preserveAspectRatio', 'xMidYMid meet');

        // Center label
        svg.append('text')
            .attr('x', cx).attr('y', cy - 8)
            .attr('text-anchor', 'middle')
            .attr('fill', 'rgba(255,255,255,0.9)')
            .attr('font-size', mobile ? '12px' : '16px')
            .attr('font-weight', '700')
            .text('Execution');
        svg.append('text')
            .attr('x', cx).attr('y', cy + 12)
            .attr('text-anchor', 'middle')
            .attr('fill', 'rgba(255,255,255,0.9)')
            .attr('font-size', mobile ? '12px' : '16px')
            .attr('font-weight', '700')
            .text('Flywheel');

        // Position nodes in a circle
        const positions = steps.map((s, i) => {
            const angle = (i / steps.length) * Math.PI * 2 - Math.PI / 2;
            return {
                ...s,
                x: cx + Math.cos(angle) * radius,
                y: cy + Math.sin(angle) * radius,
                angle,
            };
        });

        // Draw curved arrow paths between nodes
        const pathGroup = svg.append('g');
        const paths = [];

        positions.forEach((from, i) => {
            const to = positions[(i + 1) % positions.length];
            const midAngle = (from.angle + to.angle) / 2 + (i === 3 ? Math.PI : 0);
            const bulge = radius * 0.4;
            const mx = cx + Math.cos(midAngle) * (radius - bulge);
            const my = cy + Math.sin(midAngle) * (radius - bulge);

            const pathD = `M ${from.x} ${from.y} Q ${mx} ${my} ${to.x} ${to.y}`;
            const pathEl = pathGroup.append('path')
                .attr('d', pathD)
                .attr('fill', 'none')
                .attr('stroke', from.color)
                .attr('stroke-opacity', 0.3)
                .attr('stroke-width', 2)
                .attr('stroke-dasharray', '8,4');

            paths.push({ element: pathEl, pathD, from, to, color: from.color });
        });

        // Animated particles along paths
        paths.forEach((p, i) => {
            const particleCount = 2;
            for (let j = 0; j < particleCount; j++) {
                const particle = pathGroup.append('circle')
                    .attr('r', 3)
                    .attr('fill', p.color)
                    .attr('filter', 'url(#glow)');

                function animateParticle() {
                    const pathNode = p.element.node();
                    const totalLength = pathNode.getTotalLength();
                    const startOffset = (j / particleCount) * totalLength;

                    particle.attr('opacity', 0);
                    const duration = 2500 + Math.random() * 500;

                    function step(timestamp) {
                        if (!particle._start) particle._start = timestamp;
                        const elapsed = timestamp - particle._start;
                        const progress = (elapsed % duration) / duration;
                        const pos = pathNode.getPointAtLength(((startOffset / totalLength + progress) % 1) * totalLength);
                        particle.attr('cx', pos.x).attr('cy', pos.y).attr('opacity', 0.8);
                        requestAnimationFrame(step);
                    }

                    setTimeout(() => requestAnimationFrame(step), i * 400 + j * 800);
                }
                animateParticle();
            }
        });

        // Draw nodes
        positions.forEach(p => {
            const g = svg.append('g').attr('transform', `translate(${p.x},${p.y})`);

            g.append('circle')
                .attr('r', mobile ? 30 : 40)
                .attr('fill', p.color)
                .attr('opacity', 0.9)
                .attr('filter', 'url(#glow)');

            g.append('text')
                .attr('text-anchor', 'middle')
                .attr('dy', -4)
                .attr('fill', 'white')
                .attr('font-size', mobile ? '14px' : '18px')
                .text(p.icon);

            g.append('text')
                .attr('text-anchor', 'middle')
                .attr('dy', mobile ? 14 : 16)
                .attr('fill', 'white')
                .attr('font-size', mobile ? '9px' : '11px')
                .attr('font-weight', '600')
                .text(p.label);
        });
    }

    // ===== D3 VIZ 5: CTA PARTICLE BACKGROUND =====
    function initCtaNetwork() {
        const container = document.getElementById('cta-network');
        if (!container) return;
        container.innerHTML = '';
        const w = container.clientWidth;
        const h = container.clientHeight || 400;
        const nodeCount = isMobile() ? 15 : 35;

        const nodes = d3.range(nodeCount).map(() => ({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 1.5 + 1,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.2,
        }));

        const svg = d3.select(container).append('svg')
            .attr('viewBox', `0 0 ${w} ${h}`)
            .attr('preserveAspectRatio', 'xMidYMid slice');

        const linkGroup = svg.append('g');
        const nodeEls = svg.append('g').selectAll('circle').data(nodes).enter().append('circle')
            .attr('r', d => d.r)
            .attr('fill', '#a78bfa')
            .attr('opacity', 0.3);

        function animate() {
            nodes.forEach(n => {
                n.x += n.vx; n.y += n.vy;
                if (n.x < 0 || n.x > w) n.vx *= -1;
                if (n.y < 0 || n.y > h) n.vy *= -1;
            });
            nodeEls.attr('cx', d => d.x).attr('cy', d => d.y);

            const dynamicLinks = [];
            nodes.forEach((a, i) => {
                nodes.forEach((b, j) => {
                    if (j > i) {
                        const dist = Math.hypot(a.x - b.x, a.y - b.y);
                        if (dist < 120) dynamicLinks.push({ source: a, target: b, dist });
                    }
                });
            });
            const lineUpdate = linkGroup.selectAll('line').data(dynamicLinks);
            lineUpdate.exit().remove();
            lineUpdate.enter().append('line').merge(lineUpdate)
                .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x).attr('y2', d => d.target.y)
                .attr('stroke', d => `rgba(167, 139, 250, ${0.1 * (1 - d.dist / 120)})`)
                .attr('stroke-width', 0.5);
            requestAnimationFrame(animate);
        }
        animate();
    }

    // ===== LAZY INIT VIA INTERSECTION OBSERVER =====
    // Hero starts immediately
    initHeroNetwork();

    const vizObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && !entry.target.dataset.initialized) {
                entry.target.dataset.initialized = 'true';
                const id = entry.target.id;
                if (id === 'maturity-viz') initMaturityViz();
                else if (id === 'ecosystem-viz') initEcosystemViz();
                else if (id === 'flywheel-viz') initFlywheelViz();
                else if (id === 'cta-network') initCtaNetwork();
            }
        });
    }, { threshold: 0.1 });

    ['maturity-viz', 'ecosystem-viz', 'flywheel-viz', 'cta-network'].forEach(id => {
        const el = document.getElementById(id);
        if (el) vizObserver.observe(el);
    });

    // ===== DEBOUNCED RESIZE HANDLER =====
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            // Reinitialize all visualizations
            initHeroNetwork();
            const maturityEl = document.getElementById('maturity-viz');
            if (maturityEl && maturityEl.dataset.initialized) initMaturityViz();
            const ecoEl = document.getElementById('ecosystem-viz');
            if (ecoEl && ecoEl.dataset.initialized) initEcosystemViz();
            const flyEl = document.getElementById('flywheel-viz');
            if (flyEl && flyEl.dataset.initialized) initFlywheelViz();
            const ctaEl = document.getElementById('cta-network');
            if (ctaEl && ctaEl.dataset.initialized) initCtaNetwork();
        }, 300);
    });
    </script>
